name: Aktualnosci migracyjne

on:
  schedule:
    - cron: "12,42 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pobierz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pobierz aktualnosci
        run: python fetch_news.py

      - name: Zapisz news.json
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Aktualizacja aktualnosci"
          git pull --rebase origin main
          git push
